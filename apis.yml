apis:
  - name: iHeartRadio Catalog API
    description: >-
      The iHeartRadio Catalog API provides search and discovery capabilities
      across the iHeartRadio content catalog, including live broadcast radio
      stations, digital-only stations, podcasts, artists, tracks, and playlists.
      Results include station metadata, stream URLs, podcast episode information,
      and artist data. The API is accessible without authentication for basic
      catalog queries.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.iheart.com
    baseURL: https://api.iheart.com
    tags:
      - Radio Stations
      - Podcasts
      - Search
      - Catalog
      - Music Discovery
    properties:
      - type: Documentation
        url: https://developer.iheart.com
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/iheart-radio/refs/heads/main/openapi.yml
    contact:
      - FN: iHeartRadio Developer Support
        url: https://help.iheart.com
        email: ''
  - name: iHeartRadio Live Stations API
    description: >-
      The iHeartRadio Live Stations API provides access to live broadcast radio
      station information including station metadata, market information, genre
      classification, and streaming URLs across multiple formats including HLS,
      Shoutcast, RTMP, and StreamTheWorld protocols. Supports retrieval of
      individual station details by station ID.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.iheart.com
    baseURL: https://api.iheart.com
    tags:
      - Live Radio
      - Streaming
      - Radio Stations
      - HLS
      - Shoutcast
    properties:
      - type: Documentation
        url: https://developer.iheart.com
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/iheart-radio/refs/heads/main/openapi.yml
    contact:
      - FN: iHeartRadio Developer Support
        url: https://help.iheart.com
        email: ''
  - name: iHeartRadio Podcasts API
    description: >-
      The iHeartRadio Podcasts API enables search and discovery of podcasts
      available on the iHeartRadio platform, along with retrieval of individual
      podcast episode listings and direct audio stream URLs for episode playback.
      Supports searching for podcasts by name and retrieving full episode
      catalogs for any podcast series.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.iheart.com
    baseURL: https://api.iheart.com
    tags:
      - Podcasts
      - Episodes
      - Audio
      - Streaming
    properties:
      - type: Documentation
        url: https://developer.iheart.com
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/iheart-radio/refs/heads/main/openapi.yml
