name: iHeartRadio
description: >-
  iHeartRadio is a digital radio platform operated by iHeartMedia that provides
  access to over 800 live broadcast and digital-only radio stations from more
  than 150 U.S. cities, podcasts, artist-based custom stations, and curated
  music content. The platform offers REST APIs enabling programmatic access to
  live station streams, catalog search across stations, podcasts, artists and
  tracks, and podcast episode retrieval with direct audio stream URLs.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Radio
  - Podcasts
  - Music
  - Streaming
  - Audio
  - Live Radio
  - Digital Media
